<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0F1C2E;font-family:Arial,sans-serif;color:#fff;}
.nav{background:#0A1525;padding:16px 40px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #C9A96E33;}
.nav-logo{font-size:22px;font-weight:900;letter-spacing:2px;color:#fff;}
.nav-logo span{color:#C9A96E;}

.hero{padding:40px;text-align:center;background:#0A1525;border-bottom:1px solid #C9A96E22;}
.hero h1{font-size:28px;font-weight:900;color:#fff;margin-bottom:8px;}
.hero h1 span{color:#C9A96E;}
.hero p{font-size:14px;color:#A0B4C8;}
.form-container{max-width:800px;margin:40px auto;padding:0 20px 60px;}

.section-title{font-size:17px;font-weight:700;color:#fff;}
.section-sub{font-size:11px;color:#C9A96E;letter-spacing:2px;margin-top:2px;}
.form-group{margin-bottom:18px;}
.form-group label{display:block;font-size:12px;color:#C9A96E;letter-spacing:1px;margin-bottom:8px;font-weight:700;}
.form-group input,.form-group select,.form-group textarea{width:100%;background:#0F1C2E;border:1px solid #C9A96E33;border-radius:4px;padding:11px 14px;color:#fff;font-size:14px;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:#C9A96E;}

.form-group select option{background:#0F1C2E;}

.radio-group{display:flex;flex-wrap:wrap;gap:12px;margin-top:8px;}
.radio-item{display:flex;align-items:center;gap:8px;cursor:pointer;}
.radio-item input[type=radio]{width:16px;height:16px;accent-color:#C9A96E;cursor:pointer;}
.radio-item label{font-size:13px;color:#A0B4C8;cursor:pointer;letter-spacing:0;}
.cta-btn{background:#C9A96E;color:#0F1C2E;font-size:16px;font-weight:900;padding:16px 48px;border-radius:4px;border:none;cursor:pointer;letter-spacing:1px;width:100%;}
.cta-btn:hover{background:#B8945A;}
.form-note{font-size:12px;color:#5A7A9A;text-align:center;margin-top:16px;}
.footer{background:#060E18;padding:30px 40px;text-align:center;border-top:1px solid #C9A96E22;}

    </select>
  </div>

    </div>
  </div>
</div>

<!-- SECTION 11 -->
<div class="section-card">
  <div class="section-header">
