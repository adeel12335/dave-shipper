        {name:"best_time", type:"text", col:"full", label:{fr:"Meilleur moment pour vous joindre",en:"Best time to reach you"}, placeholder:{fr:"Ex: lundi au vendredi, 8h-17h",en:"e.g. Monday to Friday, 8am-5pm"}},
        {name:"followup_person", type:"text", col:"full", label:{fr:"Responsable du suivi dans votre entreprise",en:"Follow-up contact at your company"}, placeholder:{fr:"Nom et titre de la personne responsable",en:"Name and title of the responsible person"}},
        {name:"additional_info", type:"textarea", col:"full", label:{fr:"Informations supplémentaires",en:"Additional information"}, placeholder:{fr:"Tout ce qui pourrait nous aider à trouver le candidat parfait...",en:"Anything that could help us find the perfect candidate..."}}
      ]}
    ],
    buildPayload: function (v, locale) {
      var coreKeys = ["company_name","contact_name","contact_title","phone","email","website","city_region","position_type","drivers_count"];
      var details = {};
      Object.keys(v).forEach(function (k) {
        if (coreKeys.indexOf(k) === -1) details[k] = v[k];
      });
      return {
        company_name: v.company_name,
        contact_name: v.contact_name,
        contact_title: v.contact_title || null,
        phone: v.phone,
        email: v.email,
        website: v.website || null,
        city_region: v.city_region || null,
        position_type: v.position_type || null,
        drivers_count: v.drivers_count || null,
        details: details,
        locale: locale
      };
    }
  };

  CRForm.render(schema);
  </script>
