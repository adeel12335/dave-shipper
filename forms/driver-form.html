<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="format-detection" content="telephone=no,email=no" />
<title>CamionRecrute.com — Candidature Chauffeur</title>
<link rel="icon" href="../images/logo.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css" />
</head>
<body class="form-page">

  <div id="site-header"></div>

  <!-- PROGRESS -->
  <div class="progress">
    <div class="wrap">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-text" id="progressText">SECTION 1 / 6</div>
    </div>
  </div>

  <!-- HERO -->
  <div class="form-hero">
    <h1 data-form-title>Application Chauffeur</h1>
    <p data-form-intro>Merci de compléter ce formulaire afin que notre équipe puisse évaluer votre profil.</p>
  </div>

  <div class="form-container">
    <div id="crform-root"></div>
  </div>

  <div id="site-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/config.js"></script>
  <script src="../js/i18n.js"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="../js/layout.js"></script>
  <script src="../js/form-renderer.js"></script>
  <script>
  CR.applyLang(CR.getLang());

  var EQUIP = [
    {label:{fr:"Dry Van",en:"Dry Van"}},{label:{fr:"Reefer",en:"Reefer"}},{label:{fr:"Flatbed",en:"Flatbed"}},
    {label:{fr:"Citerne",en:"Tanker"}},{label:{fr:"Dompeur",en:"Dump"}},{label:{fr:"Container",en:"Container"}},
    {label:{fr:"Train Routier",en:"Road Train"}},{label:{fr:"Moffat",en:"Moffett"}},{label:{fr:"Tailgate",en:"Tailgate"}},
    {label:{fr:"Transpalette",en:"Pallet jack"}},{label:{fr:"Diable",en:"Hand truck"}}
  ];
  var TRANSPORT = [
    {label:{fr:"Local",en:"Local"}},{label:{fr:"Régional",en:"Regional"}},
    {label:{fr:"Longue Distance Canada",en:"Long-haul Canada"}},{label:{fr:"Longue Distance U.S.",en:"Long-haul U.S."}}
  ];

  var schema = {
    table: "driver_applications",
    title: {fr:"Application <span class='gold'>Chauffeur</span>", en:"Driver <span class='gold'>Application</span>"},
    intro: {fr:"Merci de compléter ce formulaire afin que notre équipe puisse évaluer votre profil. Seuls les candidats correspondant à nos besoins clients seront contactés.",
            en:"Please complete this form so our team can evaluate your profile. Only candidates matching our client needs will be contacted."},
    submit: {fr:"Soumettre ma candidature", en:"Submit my application"},
    note: {fr:"Seuls les candidats correspondant à nos besoins seront contactés. Votre information est confidentielle.",
           en:"Only candidates matching our needs will be contacted. Your information is confidential."},
    sections: [
      { num:1, title:{fr:"Informations Personnelles",en:"Personal Information"}, sub:{fr:"VOS COORDONNÉES",en:"YOUR DETAILS"}, fields:[
        {name:"full_name", type:"text", required:true, label:{fr:"Nom complet",en:"Full name"}, placeholder:{fr:"Prénom et nom",en:"First and last name"}},
        {name:"phone", type:"tel", required:true, label:{fr:"Numéro de téléphone",en:"Phone number"}, placeholder:{fr:"(514) 555-1234",en:"(514) 555-1234"}},
        {name:"email", type:"email", required:true, label:{fr:"Adresse courriel",en:"Email address"}, placeholder:{fr:"vous@courriel.com",en:"you@email.com"}},
        {name:"city", type:"text", required:true, label:{fr:"Ville",en:"City"}, placeholder:{fr:"Montréal",en:"Montreal"}},
        {name:"province", type:"select", required:true, col:"full", label:{fr:"Province",en:"Province"}, options:[
          {label:{fr:"Québec",en:"Quebec"}},{label:{fr:"Ontario",en:"Ontario"}},{label:{fr:"Alberta",en:"Alberta"}},
          {label:{fr:"Colombie-Britannique",en:"British Columbia"}},{label:{fr:"Manitoba",en:"Manitoba"}},
          {label:{fr:"Saskatchewan",en:"Saskatchewan"}},{label:{fr:"Nouvelle-Écosse",en:"Nova Scotia"}},
          {label:{fr:"Nouveau-Brunswick",en:"New Brunswick"}},{label:{fr:"Autre",en:"Other"}}
        ]}
      ]},
      { num:2, title:{fr:"Expérience & Qualifications",en:"Experience & Qualifications"}, sub:{fr:"VOTRE PROFIL",en:"YOUR PROFILE"}, fields:[
        {name:"years_experience", type:"select", required:true, col:"full", label:{fr:"Années d'expérience comme chauffeur",en:"Years of experience as a driver"}, options:[
          {label:{fr:"Moins de 1 an",en:"Less than 1 year"}},{label:{fr:"1-2 ans",en:"1-2 years"}},{label:{fr:"3-5 ans",en:"3-5 years"}},
          {label:{fr:"5-10 ans",en:"5-10 years"}},{label:{fr:"10+ ans",en:"10+ years"}}
        ]},
        {name:"equipment", type:"checkboxes", col:"full", label:{fr:"Type d'équipement déjà opéré",en:"Equipment you have operated"}, options:EQUIP},
        {name:"license_classes", type:"checkboxes", col:"full", required:false, label:{fr:"Classe de permis",en:"License class"}, options:[
          {label:{fr:"Classe 1 FM",en:"Class 1 FM"}},{label:{fr:"Classe 1 F",en:"Class 1 F"}},
          {label:{fr:"Classe 3 FM",en:"Class 3 FM"}},{label:{fr:"Classe 3 F",en:"Class 3 F"}}
        ]},
        {name:"transport_types", type:"checkboxes", col:"full", label:{fr:"Type de transport",en:"Transport type"}, options:TRANSPORT}
      ]},
      { num:3, title:{fr:"Disponibilité & Salaire",en:"Availability & Salary"}, sub:{fr:"VOS CONDITIONS",en:"YOUR TERMS"}, fields:[
        {name:"available_from", type:"date", required:true, label:{fr:"Disponible à partir de",en:"Available from"}},
        {name:"desired_salary", type:"text", required:true, label:{fr:"Salaire recherché (taux horaire)",en:"Desired salary (hourly)"}, placeholder:{fr:"Ex: 25$/h",en:"e.g. $25/h"}}
      ]},
      { num:4, title:{fr:"Statut Légal",en:"Legal Status"}, sub:{fr:"DROIT DE TRAVAIL",en:"RIGHT TO WORK"}, fields:[
        {name:"legal_right_to_work", type:"radios", required:true, col:"full", label:{fr:"Avez-vous le droit légal de travailler au Canada?",en:"Do you have the legal right to work in Canada?"}, options:[
          {label:{fr:"Oui",en:"Yes"}},{label:{fr:"Non",en:"No"}}
        ]},
        {name:"legal_status", type:"radios", required:true, col:"full", label:{fr:"Quel est votre statut?",en:"What is your status?"}, options:[
          {label:{fr:"Citoyen Canadien",en:"Canadian Citizen"}},{label:{fr:"Résident Permanent",en:"Permanent Resident"}},
          {label:{fr:"Permis de Travail Ouvert",en:"Open Work Permit"}},{label:{fr:"Permis de Travail Fermé",en:"Closed Work Permit"}},
          {label:{fr:"Étudiant Étranger",en:"Foreign Student"}},{label:{fr:"Autre",en:"Other"}}
        ]}
      ]},
      { num:5, title:{fr:"Type de Poste Recherché",en:"Desired Position"}, sub:{fr:"VOS PRÉFÉRENCES",en:"YOUR PREFERENCES"}, fields:[
        {name:"position_types", type:"checkboxes", col:"full", label:{fr:"Type de poste recherché",en:"Position type wanted"}, options:[
          {label:{fr:"Dry Van",en:"Dry Van"}},{label:{fr:"Reefer",en:"Reefer"}},{label:{fr:"Flatbed",en:"Flatbed"}},{label:{fr:"Container",en:"Container"}},
          {label:{fr:"Dompeur",en:"Dump"}},{label:{fr:"Citerne",en:"Tanker"}},{label:{fr:"Train Routier",en:"Road Train"}},{label:{fr:"B-Train",en:"B-Train"}},
          {label:{fr:"Moffat",en:"Moffett"}},{label:{fr:"Tailgate",en:"Tailgate"}},{label:{fr:"Transpalette",en:"Pallet jack"}},{label:{fr:"Diable",en:"Hand truck"}},
          {label:{fr:"Sans Manutention",en:"No handling"}},{label:{fr:"Avec Manutention",en:"With handling"}},{label:{fr:"Shunter",en:"Shunter"}}
        ]},
        {name:"distance_regions", type:"checkboxes", col:"full", label:{fr:"Région de distance recherchée",en:"Distance region wanted"}, options:TRANSPORT}
      ]},
      { num:6, title:{fr:"Horaire & Type d'Emploi",en:"Schedule & Employment Type"}, sub:{fr:"VOS DISPONIBILITÉS",en:"YOUR AVAILABILITY"}, fields:[
        {name:"schedule", type:"checkboxes", col:"full", label:{fr:"Horaire recherché",en:"Schedule wanted"}, options:[
          {label:{fr:"Jour",en:"Day"}},{label:{fr:"Soir",en:"Evening"}},{label:{fr:"Nuit",en:"Night"}},
          {label:{fr:"Fin de Semaine",en:"Weekend"}},{label:{fr:"Flexible",en:"Flexible"}}
        ]},
        {name:"employment_types", type:"checkboxes", col:"full", label:{fr:"Type d'emploi recherché",en:"Employment type wanted"}, options:[
          {label:{fr:"Temps Plein",en:"Full-time"}},{label:{fr:"Temps Partiel",en:"Part-time"}},{label:{fr:"Permanent",en:"Permanent"}},
          {label:{fr:"Contractuel",en:"Contract"}},{label:{fr:"Saisonnier",en:"Seasonal"}}
        ]},
        {name:"languages", type:"checkboxes", col:"full", label:{fr:"Langues",en:"Languages"}, options:[
          {label:{fr:"Français Parlé",en:"French spoken"}},{label:{fr:"Anglais Parlé",en:"English spoken"}},
          {label:{fr:"Français Écrit",en:"French written"}},{label:{fr:"Anglais Écrit",en:"English written"}}
        ]}
      ]}
    ],
    buildPayload: function (v, locale) {
      return {
        full_name: v.full_name, phone: v.phone, email: v.email, city: v.city, province: v.province,
        years_experience: v.years_experience, equipment: v.equipment || [], license_classes: v.license_classes || [],
        transport_types: v.transport_types || [], available_from: v.available_from || null, desired_salary: v.desired_salary,
        legal_right_to_work: v.legal_right_to_work, legal_status: v.legal_status,
        position_types: v.position_types || [], distance_regions: v.distance_regions || [],
        schedule: v.schedule || [], employment_types: v.employment_types || [], languages: v.languages || [],
        locale: locale
      };
    }
  };

  CRForm.render(schema);
  </script>
</body>
</html>
